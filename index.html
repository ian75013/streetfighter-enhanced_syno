<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Street Fighter II Turbo - HTML5</title>
    <link rel="icon" type="image/GIF" href="res/favicon.ico"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="full-screen" content="yes"/>
    <meta name="screen-orientation" content="landscape"/>
    <meta name="x5-fullscreen" content="true"/>
    <meta name="360-fullscreen" content="true"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <style>
        * {
            margin: 0;
            padding: 0;
            -moz-user-select: none;
            -webkit-user-select: none;
            -ms-user-select: none;
            -webkit-tap-highlight-color: rgba(0,0,0,0);
        }
        html, body {
            width: 100%;
            height: 100%;
            background: #000 !important;
            overflow: hidden;
        }
        /* Force-center the cocos container that wraps the canvas */
        #Cocos2dGameContainer {
            position: absolute !important;
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) !important;
            margin: 0 !important;
        }
        #gameCanvas {
            display: block;
        }
    </style>
</head>
<body>
<canvas id="gameCanvas" width="480" height="320"></canvas>
<script src="frameworks/cocos2d-html5/CCBoot.js"></script>
<script src="main.js"></script>
<script>
// Fallback: force center after cocos2d initializes its container
(function centerLoop() {
    var container = document.getElementById('Cocos2dGameContainer');
    if (container) {
        container.style.position = 'absolute';
        container.style.top = '50%';
        container.style.left = '50%';
        container.style.transform = 'translate(-50%, -50%)';
        container.style.margin = '0';
        container.style.webkitTransform = 'translate(-50%, -50%)';
    }
    // Re-apply on resize
    window.addEventListener('resize', function() {
        var c = document.getElementById('Cocos2dGameContainer');
        if (c) {
            c.style.position = 'absolute';
            c.style.top = '50%';
            c.style.left = '50%';
            c.style.transform = 'translate(-50%, -50%)';
            c.style.margin = '0';
        }
    });
    // Retry until container exists
    if (!container) setTimeout(centerLoop, 100);
})();
</script>
</body>
</html>
